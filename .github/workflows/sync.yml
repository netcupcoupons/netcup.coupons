name: Sync Netcup Vouchers

on:
  schedule:
    # 设定每 5 分钟自动执行一次
    - cron: '*/15 * * * *'
  workflow_dispatch: # 支持在 GitHub 页面上手动点击执行

permissions:
  contents: write # 必须赋予写入权限，以允许 Actions 将更新后的 README 提交回仓库

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Sync Script
        run: python sync.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes in voucher codes."
          else
            git commit -m "Auto-update voucher codes [skip ci]"
            git push
          fi

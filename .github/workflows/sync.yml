name: Sync Netcup Vouchers

on:
  repository_dispatch:
    types: [sync_vouchers] # 监听 WordPress 发来的即时更新通知事件
  schedule:
    - cron: '0 0 * * *' # 每日备份同步：每天午夜 UTC 自动跑一次作为安全备份
  workflow_dispatch: # 允许手动在 GitHub 页面触发

# 并发控制：如果新的同步任务触发时，上一次任务还在跑，立刻自动取消旧任务，防止 Git 提交锁冲突
concurrency:
  group: sync-vouchers
  cancel-in-progress: true

permissions:
  contents: write # 开启写入权限

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Sync Script
        run: python sync.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes in voucher codes."
          else
            git commit -m "Auto-update voucher codes [skip ci]"
            git push
          fi

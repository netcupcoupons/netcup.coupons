name: Sync Netcup Vouchers

on:
  repository_dispatch:
    types: [sync_vouchers] # Trigger instantly when WordPress calls the API
  schedule:
    - cron: '0 0 * * *' # Backup sync: Runs once a day at midnight UTC
  workflow_dispatch: # Allow manual trigger from GitHub Actions page

# Concurrency control: cancel any in-progress sync runs if a new one is triggered
concurrency:
  group: sync-vouchers
  cancel-in-progress: true

permissions:
  contents: write # Required to allow pushing README.md changes back to repo

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Sync Script
        run: python sync.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md README_ZH.md README_DE.md
          if git diff --staged --quiet; then
            echo "No changes in voucher codes."
          else
            git commit -m "Auto-update voucher codes [skip ci]"
            git push
          fi
